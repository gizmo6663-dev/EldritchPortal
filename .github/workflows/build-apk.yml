# .github/workflows/build-apk.yml
# Bygger Eldritch Portal APK automatisk ved push til main-branch.
# APK-en lastes opp som en "artifact" du kan laste ned fra GitHub.

name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:  # Lar deg starte bygg manuelt fra GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer systemavhengigheter
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git libncurses5-dev libffi-dev libssl-dev \
            openjdk-17-jdk unzip zip autoconf libtool pkg-config \
            zlib1g-dev libltdl-dev cmake

      - name: Installer Buildozer og Cython
        run: |
          pip install buildozer cython

      - name: Cache Buildozer (SDK/NDK)
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Bygg APK
        run: |
          buildozer android debug

      - name: Last opp APK
        uses: actions/upload-artifact@v4
        with:
          name: eldritch-portal-apk
          path: bin/*.apk
          retention-days: 30
