name: Build APK (Docker stabil)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Tving clean build (slett .buildozer)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-docker-${{ hashFiles('buildozer.spec') }}-${{ github.event.inputs.clean_build }}
          restore-keys: |
            ${{ runner.os }}-buildozer-docker-

      - name: Bygg APK med Docker (kivy/buildozer:1.0.0)
        run: |
          if [[ "${{ github.event.inputs.clean_build }}" == "true" ]]; then
            echo "🧹 Sletter .buildozer-mappe for clean build"
            rm -rf ~/.buildozer
          fi
          docker run --rm \
            -v "$PWD":/home/user/hostcwd \
            -v "$HOME/.buildozer":/home/user/.buildozer \
            kivy/buildozer:1.0.0 \
            bash -c "yes | buildozer android debug"

      - name: Last opp APK
        uses: actions/upload-artifact@v4
        with:
          name: eldritch-portal-apk
          path: bin/*.apk
          retention-days: 30