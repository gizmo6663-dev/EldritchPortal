name: Build APK

on:
  push:
    branches: [main]
    paths:
      - '**.py'
      - 'buildozer.spec'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Tving clean build (slett .buildozer)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Sjekk hvilke filer som er endret
        id: changes
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Manuell kjøring – alltid full build"
            echo "full_build=true" >> $GITHUB_OUTPUT
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || echo "unknown")
            echo "Endrede filer: $CHANGED"
            if echo "$CHANGED" | grep -qvE "^main\.py$"; then
              echo "full_build=true" >> $GITHUB_OUTPUT
            else
              echo "full_build=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Cache apt-pakker
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/build-apk.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-

      - name: Installer systemavhengigheter og libtool 2.4.6
        if: steps.changes.outputs.full_build == 'true'
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf automake pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          sudo apt remove -y libtool
          cd /tmp
          wget https://ftp.gnu.org/gnu/libtool/libtool-2.4.6.tar.gz
          tar xzf libtool-2.4.6.tar.gz
          cd libtool-2.4.6
          ./configure --prefix=/usr
          make -j$(nproc)
          sudo make install
          cd /

      - name: Installer buildozer og cython
        if: steps.changes.outputs.full_build == 'true'
        run: |
          pip3 install --upgrade buildozer "cython<3.0"

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-nojnius-${{ hashFiles('buildozer.spec') }}-${{ github.event.inputs.clean_build }}
          restore-keys: |
            ${{ runner.os }}-buildozer-nojnius-

      - name: Bygg APK
        run: |
          if [[ "${{ github.event.inputs.clean_build }}" == "true" ]]; then
            echo "🧹 Sletter .buildozer-mappe for clean build"
            rm -rf ~/.buildozer
          fi
          yes | buildozer android debug

      - name: Last opp APK (artifact)
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: eldritch-portal-apk
          path: bin/*.apk
          retention-days: 7

      - name: Lag GitHub Release
        run: |
          VERSION=$(grep '^version' buildozer.spec | sed 's/version = //')
          TAG="v${VERSION}-build${{ github.run_number }}"
          APK=$(ls bin/*.apk | head -1)
          gh release create "$TAG" "$APK" \
            --title "Eldritch Portal $TAG" \
            --notes "Automatisk bygg fra commit ${{ github.sha }}" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
