name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Tving clean build (slett .buildozer)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Installer systemavhengigheter (med automake)
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          # Fjern den nye autoconf og installer den stabile 2.69
          sudo apt remove -y autoconf
          cd /tmp
          wget https://ftp.gnu.org/gnu/autoconf/autoconf-2.69.tar.gz
          tar xvf autoconf-2.69.tar.gz
          cd autoconf-2.69
          ./configure --prefix=/usr
          make
          sudo make install
          cd /
          # Installer automake 1.16.5 (stabil)
          cd /tmp
          wget https://ftp.gnu.org/gnu/automake/automake-1.16.5.tar.gz
          tar xvf automake-1.16.5.tar.gz
          cd automake-1.16.5
          ./configure --prefix=/usr
          make
          sudo make install
          cd /

      - name: Installer buildozer og cython
        run: |
          pip3 install --upgrade buildozer cython

      - name: Cache buildozer-mappen
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-${{ hashFiles('buildozer.spec') }}-${{ github.event.inputs.clean_build == 'true' && 'clean' || 'normal' }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      - name: Bygg APK
        run: |
          if [[ "${{ github.event.inputs.clean_build }}" == "true" ]]; then
            echo "🧹 Tvinger clean build – sletter .buildozer"
            rm -rf ~/.buildozer
          fi
          buildozer android debug

      - name: Last opp APK
        uses: actions/upload-artifact@v4
        with:
          name: eldritch-portal-apk
          path: bin/*.apk
          retention-days: 30
