# .github/workflows/build-apk.yml
# Bygger Eldritch Portal APK med den offisielle Buildozer Docker-action.
# Alle versjoner er ferdig konfigurert i containeren — ingen kompatibilitetsproblemer.
 
name: Build APK
 
on:
  push:
    branches: [main]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
 
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4
 
      - name: Bygg med Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: 1.5.0
 
      - name: Last opp APK
        uses: actions/upload-artifact@v4
        with:
          name: eldritch-portal-apk
          path: ${{ steps.buildozer.outputs.filename }}
          retention-days: 30
 
