name: Build APK
 
on:
  push:
    branches: [main]
  workflow_dispatch:
 
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
 
    steps:
      - name: Checkout kode
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
 
      - name: Installer systemavhengigheter
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            build-essential git libncurses5-dev libffi-dev libssl-dev \
            unzip zip autoconf libtool pkg-config \
            zlib1g-dev libltdl-dev cmake
 
      - name: Installer Buildozer med kompatible versjoner
        run: |
          pip install "cython<3.0" "virtualenv" "python-for-android==2023.9.16" "buildozer==1.5.0"
 
      - name: Cache Buildozer (SDK/NDK)
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-v3-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v3-${{ runner.os }}-
 
      - name: Bygg APK
        run: |
          buildozer android debug
 
      - name: Last opp APK
        uses: actions/upload-artifact@v4
        with:
          name: eldritch-portal-apk
          path: bin/*.apk
          retention-days: 30
 
