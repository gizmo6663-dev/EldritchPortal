name: Build APK (ubuntu-latest med libtool fix)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Tving clean build (slett .buildozer)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Installer systemavhengigheter og bytt ut libtool
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk python3-pip autoconf automake libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          # Fjern den nye libtool (2.4.7) og installer 2.4.6 fra kilde
          sudo apt remove -y libtool
          cd /tmp
          wget https://ftp.gnu.org/gnu/libtool/libtool-2.4.6.tar.gz
          tar xzf libtool-2.4.6.tar.gz
          cd libtool-2.4.6
          ./configure --prefix=/usr
          make -j$(nproc)
          sudo make install
          cd /

      - name: Installer buildozer og cython
        run: |
          pip3 install --upgrade buildozer cython

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: ${{ runner.os }}-buildozer-latest-${{ hashFiles('buildozer.spec') }}-${{ github.event.inputs.clean_build }}
          restore-keys: |
            ${{ runner.os }}-buildozer-latest-

      - name: Bygg APK
        run: |
          if [[ "${{ github.event.inputs.clean_build }}" == "true" ]]; then
            echo "🧹 Sletter .buildozer-mappe for clean build"
            rm -rf ~/.buildozer
          fi
          yes | buildozer android debug

      - name: Last opp APK
        uses: actions/upload-artifact@v4
        with:
          name: eldritch-portal-apk
          path: bin/*.apk
          retention-days: 30
