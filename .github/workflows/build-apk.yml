name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Bygg APK med Kivy Docker
        run: |
          docker run \
            -v "$PWD":/home/user/hostcwd \
            -v "$HOME/.buildozer":/home/user/.buildozer \
            kivy/buildozer \
            android debug

      - name: Last opp APK
        uses: actions/upload-artifact@v4
        with:
          name: eldritch-portal-apk
          path: bin/*.apk
          retention-days: 30

  test:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Last ned APK
        uses: actions/download-artifact@v4
        with:
          name: eldritch-portal-apk

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Start emulator og test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          emulator-options: -no-window -no-audio -no-snapshot
          script: |
            echo "Installerer APK..."
            adb install -r *.apk
            echo "Starter appen..."
            adb shell am start -n org.rpg.eldritchportal/org.kivy.android.PythonActivity
            echo "Venter 15 sekunder..."
            sleep 15
            echo "===== LOGCAT OUTPUT ====="
            adb logcat -d -s python:* kivy:* SDL:* AndroidRuntime:*